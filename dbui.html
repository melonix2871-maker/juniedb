<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>genusDB GUI</title>
    <style>
        /* Clean, professional, modern, simple CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }
        h1, h2 {
            text-align: center;
            color: #007bff;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input, button, textarea {
            padding: 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #dashboard {
            display: none;
        }
        .section {
            margin-top: 2rem;
            border-top: 1px solid #dee2e6;
            padding-top: 1rem;
        }
        .output {
            background-color: #e9ecef;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
            white-space: pre-wrap;
        }
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>genusDB GUI</h1>
        <div id="login">
            <h2>Superadmin Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" value="demo" required>
                <input type="password" id="password" placeholder="Password" value="demo" required>
                <button type="submit">Login</button>
            </form>
        </div>
        <div id="dashboard">
            <h2>Dashboard</h2>
            <button id="logout">Logout</button>
            
            <div class="section">
                <h3>Database Operations</h3>
                <form id="putForm">
                    <textarea id="putData" placeholder='JSON data, e.g. {"name": "Alice"}' required></textarea>
                    <input type="text" id="putId" placeholder="Optional ID">
                    <button type="submit">Put Node</button>
                </form>
                <form id="getForm" class="section">
                    <input type="text" id="getId" placeholder="Node ID" required>
                    <button type="submit">Get Node</button>
                </form>
                <form id="queryForm" class="section">
                    <textarea id="query" placeholder='Query, e.g. {where: {"role": "admin"}}' required></textarea>
                    <button type="submit">Query Nodes</button>
                </form>
                <div id="dbOutput" class="output"></div>
            </div>
            
            <div class="section">
                <h3>genusRTC Chat</h3>
                <div id="chatMessages" class="chat-messages"></div>
                <form id="chatForm">
                    <input type="text" id="chatMessage" placeholder="Type a message" required>
                    <button type="submit">Send</button>
                </form>
            </div>
            
            <div class="section">
                <h3>Settings</h3>
                <form id="settingsForm">
                    <input type="text" id="newUsername" placeholder="New Username">
                    <input type="password" id="newPassword" placeholder="New Password">
                    <button type="submit">Update Credentials</button>
                </form>
            </div>
            
            <div class="section">
                <h3>API Access</h3>
                <button id="generateKey">Generate API Key</button>
                <div id="apiKey" class="output"></div>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { gdb } from "https://cdn.jsdelivr.net/npm/genosdb@latest/dist/index.min.js";

        let db;
        let chatChannel;
        let apiKeys = JSON.parse(localStorage.getItem('apiKeys')) || [];
        let superUsername = localStorage.getItem('superUsername') || 'demo';
        let superPassword = localStorage.getItem('superPassword') || 'demo';
        const loginDiv = document.getElementById('login');
        const dashboardDiv = document.getElementById('dashboard');
        const dbOutput = document.getElementById('dbOutput');
        const chatMessages = document.getElementById('chatMessages');
        const apiKeyDiv = document.getElementById('apiKey');

        // Initialize DB
        async function initDB() {
            try {
                db = await gdb("genusdb-gui", { rtc: true });
                // For simplicity, SM not enabled; add if needed: sm: { superAdmins: [] }
                
                // Setup RTC chat
                chatChannel = db.room.channel("gui-chat");
                chatChannel.on("message", (msg, peerId) => {
                    appendChatMessage(`Peer ${peerId.slice(0,6)}: ${msg.text}`);
                });
                
                appendChatMessage("Connected to genusRTC chat.");
            } catch (error) {
                console.error("DB init error:", error);
                dbOutput.textContent = "Error initializing database: " + error.message;
            }
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === superUsername && pass === superPassword) {
                loginDiv.style.display = 'none';
                dashboardDiv.style.display = 'block';
                initDB();
            } else {
                alert('Invalid credentials');
            }
        });

        // Logout
        document.getElementById('logout').addEventListener('click', () => {
            dashboardDiv.style.display = 'none';
            loginDiv.style.display = 'block';
            // Optional: db.close() if available
        });

        // Update settings
        document.getElementById('settingsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newUser = document.getElementById('newUsername').value;
            const newPass = document.getElementById('newPassword').value;
            if (newUser) superUsername = newUser;
            if (newPass) superPassword = newPass;
            localStorage.setItem('superUsername', superUsername);
            localStorage.setItem('superPassword', superPassword);
            alert('Credentials updated');
        });

        // Put node
        document.getElementById('putForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const data = JSON.parse(document.getElementById('putData').value);
                const id = document.getElementById('putId').value || undefined;
                const newId = await db.put(data, id);
                dbOutput.textContent = `Node put with ID: ${newId}`;
            } catch (error) {
                dbOutput.textContent = "Error: " + error.message;
            }
        });

        // Get node
        document.getElementById('getForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const id = document.getElementById('getId').value;
                const node = await db.get(id);
                dbOutput.textContent = `Node: ${JSON.stringify(node, null, 2)}`;
            } catch (error) {
                dbOutput.textContent = "Error: " + error.message;
            }
        });

        // Query
        document.getElementById('queryForm').addEventListener('submit', (e) => {
            e.preventDefault();
            try {
                const q = JSON.parse(document.getElementById('query').value);
                db.map(q, (node, id, action) => {
                    dbOutput.textContent += `\n${action} ${id}: ${JSON.stringify(node)}`;
                });
                dbOutput.textContent = "Query subscribed. Updates will appear here.";
            } catch (error) {
                dbOutput.textContent = "Error: " + error.message;
            }
        });

        // Chat send
        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = document.getElementById('chatMessage').value;
            chatChannel.send({ text: msg });
            appendChatMessage(`You: ${msg}`);
            document.getElementById('chatMessage').value = '';
        });

        function appendChatMessage(msg) {
            const div = document.createElement('div');
            div.textContent = msg;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Generate API Key
        document.getElementById('generateKey').addEventListener('click', () => {
            const key = crypto.randomUUID();
            apiKeys.push(key);
            localStorage.setItem('apiKeys', JSON.stringify(apiKeys));
            showApiKeys();
        });

        function showApiKeys() {
            apiKeyDiv.textContent = "API Keys:\n" + apiKeys.join('\n');
        }
        showApiKeys(); // Initial show
    </script>
</body>
</html>
